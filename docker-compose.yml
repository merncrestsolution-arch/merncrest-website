services:
  postgres:
    image: postgres:16-alpine
    container_name: merncrest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: merncrest
      POSTGRES_PASSWORD: merncrest
      POSTGRES_DB: merncrest
    ports:
      - "5434:5432"
    volumes:
      - merncrest_pg_data:/var/lib/postgresql/data

volumes:
  merncrest_pg_data:
